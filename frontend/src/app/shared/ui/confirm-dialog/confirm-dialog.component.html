<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="close(false)">Cancel</button>
  <button mat-flat-button type="button" (click)="close(true)">Confirm</button>
</mat-dialog-actions>
